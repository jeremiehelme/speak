name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json
      - run: npm ci
      - run: cd client && npm ci
      - run: cd server && npm ci --legacy-peer-deps
      - run: cd client && npx eslint .
      - run: cd server && npx eslint .
      - run: npx prettier --check "client/src/**/*.{ts,tsx}" "server/src/**/*.ts"
